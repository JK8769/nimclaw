name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: nimclaw-linux-amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            artifact: nimclaw-linux-arm64
          - os: macos-14
            goos: darwin
            goarch: arm64
            artifact: nimclaw-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Nim (choosenim)
      if: runner.arch != 'ARM64' || runner.os != 'Linux'
      uses: iffy/install-nim@v4
      with:
        version: '2.2.8'

    - name: Setup Nim (ARM64 Linux)
      if: runner.arch == 'ARM64' && runner.os == 'Linux'
      run: |
        curl -L -o nim.tar.xz "https://nim-lang.org/download/nim-2.2.8-linux_arm64.tar.xz"
        tar xJf nim.tar.xz
        echo "$PWD/nim-2.2.8/bin" >> $GITHUB_PATH
        export PATH="$PWD/nim-2.2.8/bin:$PATH"
        nim --version

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Nim dependencies
      run: nimble install -y

    - name: Build NimClaw
      run: nimble build

    - name: Build channel CLIs
      shell: bash
      run: |
        ./channels/build_nkn_cli.sh ${{ matrix.goos }} ${{ matrix.goarch }} || echo "nkn-cli build skipped"
        ./channels/build_lark_cli.sh ${{ matrix.goos }} ${{ matrix.goarch }} || echo "lark-cli build skipped"

    - name: Package
      shell: bash
      run: |
        mkdir -p dist/${{ matrix.artifact }}/channels-bin
        cp nimclaw dist/${{ matrix.artifact }}/
        cp -r channels/bin/* dist/${{ matrix.artifact }}/channels-bin/ 2>/dev/null || true
        cp -r templates dist/${{ matrix.artifact }}/
        cp -r skills dist/${{ matrix.artifact }}/
        cp -r plugins dist/${{ matrix.artifact }}/
        cp install.sh dist/${{ matrix.artifact }}/
        cp README.md LICENSE dist/${{ matrix.artifact }}/ 2>/dev/null || true
        cd dist && tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: dist/${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          artifacts/*.tar.gz
          install.sh
